name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: starky-auth-deploy
  cancel-in-progress: false

permissions:
  id-token: write  # required for Azure OIDC federation
  contents: read

env:
  IMAGE_REPO: starkyacr.azurecr.io/starky-auth
  RESOURCE_GROUP: rg-starkyapp
  VM_NAME: vm-starky-auth-prod
  VM_APP_DIR: /opt/starky-auth

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: themes/starky/package-lock.json

      - name: Install theme dependencies
        working-directory: themes/starky
        run: npm ci

      - name: Build Tailwind CSS
        working-directory: themes/starky
        run: npm run build:css

      - name: Verify built CSS exists
        run: |
          test -s themes/starky/login/resources/css/styles.css
          echo "Built CSS size: $(wc -c < themes/starky/login/resources/css/styles.css) bytes"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name starkyacr

      - name: Docker build
        run: |
          docker build \
            --tag "${IMAGE_REPO}:${{ github.sha }}" \
            --tag "${IMAGE_REPO}:latest" \
            .

      - name: Docker push
        run: |
          docker push "${IMAGE_REPO}:${{ github.sha }}"
          docker push "${IMAGE_REPO}:latest"

      - name: Ensure VM prerequisites (idempotent — fast path when already installed)
        run: |
          BOOTSTRAP_SCRIPT=$(cat <<'EOF'
          set -eu
          export DEBIAN_FRONTEND=noninteractive

          # Docker
          if ! command -v docker >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y ca-certificates curl gnupg
            curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
            sh /tmp/get-docker.sh
            rm /tmp/get-docker.sh
          fi

          # Docker Compose plugin
          if ! docker compose version >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y docker-compose-plugin
          fi

          # azcopy (used later by backup.sh)
          if ! command -v azcopy >/dev/null 2>&1; then
            curl -fsSL https://aka.ms/downloadazcopy-v10-linux -o /tmp/azcopy.tgz
            tar -xzf /tmp/azcopy.tgz -C /tmp/
            mv /tmp/azcopy_linux_amd64_*/azcopy /usr/local/bin/
            chmod +x /usr/local/bin/azcopy
            rm -rf /tmp/azcopy.tgz /tmp/azcopy_linux_amd64_*
          fi

          # az CLI (needed for ACR login during deploy)
          if ! command -v az >/dev/null 2>&1; then
            curl -sL https://aka.ms/InstallAzureCLIDeb | bash
          fi

          mkdir -p /opt/starky-auth/caddy /opt/starky-auth/import /opt/starky-auth/backups
          echo "bootstrap-ok"
          EOF
          )
          output=$(az vm run-command invoke \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${VM_NAME}" \
            --command-id RunShellScript \
            --scripts "${BOOTSTRAP_SCRIPT}" \
            --query "value[0].message" -o tsv)
          echo "----- bootstrap output -----"
          echo "${output}"
          echo "----------------------------"
          if ! echo "${output}" | grep -q "bootstrap-ok"; then
            echo "VM bootstrap failed."
            exit 1
          fi

      - name: Sync config + env to VM
        env:
          VM_ENV_FILE: ${{ secrets.VM_ENV_FILE }}
        run: |
          NEW_IMAGE="${IMAGE_REPO}:${{ github.sha }}"

          # Compose the full .env content: secret body + IMAGE line.
          # printf preserves the secret's $-literals (no re-expansion).
          # tr -d '\r' strips Windows-style CRLF that GitHub's secret form
          # may preserve if the user pasted from a Windows clipboard.
          # Caddy's Caddyfile env interpolation breaks silently if values have \r.
          printf '%s\n' "$VM_ENV_FILE" | tr -d '\r' > /tmp/env_body
          printf 'IMAGE=%s\n' "${NEW_IMAGE}" >> /tmp/env_body
          ENV_B64=$(base64 -w0 < /tmp/env_body)

          # The repo's compose, Caddy config, and deploy script sync to the VM
          # on every deploy, keeping repo and VM lockstep — no drift.
          COMPOSE_B64=$(base64 -w0 < docker-compose.yml)
          CADDY_B64=$(base64 -w0 < caddy/Caddyfile)
          DEPLOY_B64=$(base64 -w0 < scripts/deploy.sh)

          # The runner already did `az acr login` — its ~/.docker/config.json
          # has a valid ACR refresh token (3h TTL). Ship that to the VM so the
          # VM doesn't need to authenticate to ACR itself. Every deploy
          # refreshes the token, so expiry is a non-issue in practice.
          DOCKER_CFG_B64=$(base64 -w0 < ~/.docker/config.json)

          SYNC_SCRIPT=$(cat <<EOF
          set -eu
          mkdir -p ${VM_APP_DIR}/caddy ${VM_APP_DIR}/import ${VM_APP_DIR}/backups ${VM_APP_DIR}/scripts /root/.docker
          echo '${COMPOSE_B64}' | base64 -d > ${VM_APP_DIR}/docker-compose.yml
          echo '${CADDY_B64}' | base64 -d > ${VM_APP_DIR}/caddy/Caddyfile
          echo '${ENV_B64}' | base64 -d > ${VM_APP_DIR}/.env
          echo '${DEPLOY_B64}' | base64 -d > ${VM_APP_DIR}/scripts/deploy.sh
          echo '${DOCKER_CFG_B64}' | base64 -d > /root/.docker/config.json
          chmod 600 ${VM_APP_DIR}/.env /root/.docker/config.json
          chmod +x ${VM_APP_DIR}/scripts/deploy.sh
          echo "sync-ok"
          EOF
          )
          output=$(az vm run-command invoke \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${VM_NAME}" \
            --command-id RunShellScript \
            --scripts "${SYNC_SCRIPT}" \
            --query "value[0].message" -o tsv)
          echo "----- sync output -----"
          echo "${output}"
          echo "-----------------------"
          if ! echo "${output}" | grep -q "sync-ok"; then
            echo "Config sync failed — missing sync-ok sentinel."
            exit 1
          fi

          rm -f /tmp/env_body

      - name: Deploy to VM
        run: |
          NEW_IMAGE="${IMAGE_REPO}:${{ github.sha }}"
          # Invoke the deploy script that the sync step placed on the VM.
          # Keeping the script in the repo (scripts/deploy.sh) means it's plain
          # bash with no heredoc-escaping gymnastics.
          DEPLOY_SCRIPT="set -e; bash ${VM_APP_DIR}/scripts/deploy.sh '${NEW_IMAGE}'"
          output=$(az vm run-command invoke \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${VM_NAME}" \
            --command-id RunShellScript \
            --scripts "${DEPLOY_SCRIPT}" \
            --query "value[0].message" -o tsv)
          echo "----- vm output -----"
          echo "${output}"
          echo "---------------------"
          if ! echo "${output}" | grep -q "deploy-ok image=${NEW_IMAGE}"; then
            echo "Deploy script did not complete successfully — missing deploy-ok sentinel."
            exit 1
          fi

      - name: Wait for Keycloak health
        run: |
          HEALTH_SCRIPT='docker inspect --format="{{.State.Health.Status}}" keycloak-server 2>/dev/null || echo missing'
          for attempt in $(seq 1 24); do
            status=$(az vm run-command invoke \
              --resource-group "${RESOURCE_GROUP}" \
              --name "${VM_NAME}" \
              --command-id RunShellScript \
              --scripts "${HEALTH_SCRIPT}" \
              --query "value[0].message" -o tsv | tr -d '[:space:]')
            echo "Attempt ${attempt}: container health = ${status}"
            if echo "${status}" | grep -q healthy; then
              echo "Keycloak is healthy."
              exit 0
            fi
            sleep 10
          done
          echo "Timeout: Keycloak did not report healthy within 240s."
          exit 1

      - name: Diagnose Caddy and verify external reachability
        run: |
          # Show container states + Caddy logs so pipeline logs tell us
          # everything we need if the external probe fails.
          DIAG_SCRIPT='
          echo "=== containers ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo
          echo "=== listening ports ==="
          ss -tlnp 2>/dev/null | head -20
          echo
          echo "=== caddy last 50 log lines ==="
          docker compose -f /opt/starky-auth/docker-compose.yml logs --tail 50 caddy 2>&1 || echo "(caddy logs unavailable)"
          echo
          echo "=== /opt/starky-auth/.env var names (values redacted) ==="
          awk -F= "/^[A-Z]/ {print \$1}" /opt/starky-auth/.env
          '
          az vm run-command invoke \
            --resource-group "${RESOURCE_GROUP}" \
            --name "${VM_NAME}" \
            --command-id RunShellScript \
            --scripts "${DIAG_SCRIPT}" \
            --query "value[0].message" -o tsv

          # External probe — retry for up to ~90s to allow Let's Encrypt
          # cert acquisition on first deploy.
          echo
          echo "=== external reachability probe ==="
          for attempt in $(seq 1 18); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' --max-time 5 \
              https://auth.starkyapp.com/health || echo "timeout")
            echo "Attempt ${attempt}: https://auth.starkyapp.com/health -> ${code}"
            if [ "${code}" = "200" ]; then
              echo "External reachability OK."
              exit 0
            fi
            sleep 5
          done
          echo "External probe failed — Caddy is not serving 443. Check the diag output above."
          exit 1
