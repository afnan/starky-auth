# ===================================================================
# Diagnostic workflow — READ-ONLY.
#
# PURPOSE
#   The production deploy (build-and-deploy.yml) keeps failing at the
#   "Diagnose Caddy and verify external reachability" step. Caddy logs
#   show Let's Encrypt cannot connect to the VM on port 80 ("Timeout
#   during connect (likely firewall problem)"). That strongly implicates
#   the Azure Network Security Group (NSG) fronting the VM — but we want
#   proof, not assumptions, before we change anything.
#
# WHAT THIS WORKFLOW DOES
#   1. Logs in to Azure with the same OIDC service principal the deploy
#      workflow uses. No new secrets required.
#   2. Finds the VM's network interface (NIC) and the NSG attached to
#      either the NIC or its subnet.
#   3. Prints every inbound rule on that NSG as a table — so we can see
#      exactly which ports are allowed from the internet.
#   4. Prints the VM's public IP + associations (so we confirm DNS is
#      pointed at the right address).
#   5. Runs TWO read-only shell checks on the VM itself via
#      `az vm run-command invoke` (no SSH needed):
#        a. `ss -tlnp` → what ports the VM is actually listening on
#        b. `docker ps` + `docker inspect keycloak-server` health state
#           + last 30 lines of Caddy logs → confirms the *internal* state
#      These are READ-ONLY — they do not restart or change any container,
#      do not write any file, and do not touch the network.
#
# WHAT THIS WORKFLOW DOES NOT DO
#   - No NSG rule is created, deleted, or modified.
#   - No VM configuration (UFW, Docker, containers, .env) is changed.
#   - No images are built or pushed.
#   - No deploy is triggered.
#   Worst case if this workflow fails mid-run: nothing on the VM or in
#   Azure is left in a different state than before it ran.
#
# HOW TO RUN
#   GitHub → Actions → "Diag (read-only)" → Run workflow (on main).
#   Then share the run logs and we'll have the exact rules + listen state.
# ===================================================================

name: Diag (read-only)

on:
  workflow_dispatch: {}

permissions:
  id-token: write   # same OIDC federation the deploy workflow uses
  contents: read

env:
  RESOURCE_GROUP: rg-starkyapp
  VM_NAME: vm-starky-auth-prod

jobs:
  diag:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Azure login (OIDC) — reuses the same service principal as deploy
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -------------------------------------------------------------
      # Find the NIC attached to the VM, then the NSG attached to
      # either the NIC or the NIC's subnet. Either placement counts —
      # Azure evaluates both when a packet hits the VM.
      # Everything here is `show`/`list` — pure reads.
      # -------------------------------------------------------------
      - name: Resolve VM NIC + NSG associations
        id: resolve
        run: |
          set -eu
          echo "=== VM NIC id ==="
          NIC_ID=$(az vm show -g "$RESOURCE_GROUP" -n "$VM_NAME" \
            --query "networkProfile.networkInterfaces[0].id" -o tsv)
          echo "NIC_ID=$NIC_ID"

          NIC_NAME=$(basename "$NIC_ID")
          echo "NIC_NAME=$NIC_NAME"

          echo
          echo "=== NIC-level NSG (may be null — then check subnet NSG below) ==="
          NIC_NSG_ID=$(az network nic show --ids "$NIC_ID" \
            --query "networkSecurityGroup.id" -o tsv 2>/dev/null || true)
          echo "NIC_NSG_ID=${NIC_NSG_ID:-<none>}"

          echo
          echo "=== Subnet of the NIC ==="
          SUBNET_ID=$(az network nic show --ids "$NIC_ID" \
            --query "ipConfigurations[0].subnet.id" -o tsv)
          echo "SUBNET_ID=$SUBNET_ID"

          echo
          echo "=== Subnet-level NSG (Azure evaluates NIC-NSG and subnet-NSG together) ==="
          SUBNET_NSG_ID=$(az network vnet subnet show --ids "$SUBNET_ID" \
            --query "networkSecurityGroup.id" -o tsv 2>/dev/null || true)
          echo "SUBNET_NSG_ID=${SUBNET_NSG_ID:-<none>}"

          # Prefer NIC-level NSG if present, else subnet-level.
          EFFECTIVE_NSG_ID="${NIC_NSG_ID:-$SUBNET_NSG_ID}"
          if [ -z "$EFFECTIVE_NSG_ID" ]; then
            echo "No NSG found at NIC or subnet level — that alone would allow traffic."
            echo "(Nothing to print below; means firewall isn't at Azure layer.)"
          else
            NSG_NAME=$(basename "$EFFECTIVE_NSG_ID")
            echo "EFFECTIVE_NSG_NAME=$NSG_NAME"
            # Pass to later steps via $GITHUB_OUTPUT (no secrets here, just a name).
            echo "nsg_name=$NSG_NAME" >> "$GITHUB_OUTPUT"
          fi

      # -------------------------------------------------------------
      # The key evidence: do NSG inbound rules permit 80 and 443 from
      # the public internet? If not, we have our root cause.
      # Still read-only — `rule list` doesn't modify anything.
      # -------------------------------------------------------------
      - name: List NSG inbound rules
        if: steps.resolve.outputs.nsg_name != ''
        run: |
          set -eu
          echo "=== Custom inbound rules on ${{ steps.resolve.outputs.nsg_name }} ==="
          az network nsg rule list \
            -g "$RESOURCE_GROUP" \
            --nsg-name "${{ steps.resolve.outputs.nsg_name }}" \
            --query "[?direction=='Inbound'].{priority:priority, name:name, access:access, proto:protocol, srcPrefix:sourceAddressPrefix, srcPrefixes:sourceAddressPrefixes, destPorts:destinationPortRanges, destPort:destinationPortRange}" \
            -o table

          echo
          echo "=== Default (Azure built-in) inbound rules ==="
          # These always exist and include the AllowVnetInBound / DenyAllInBound
          # rules at priorities 65000/65001/65500. Useful to confirm nothing
          # weird is overriding them.
          az network nsg rule list \
            -g "$RESOURCE_GROUP" \
            --nsg-name "${{ steps.resolve.outputs.nsg_name }}" \
            --include-default \
            --query "[?direction=='Inbound' && contains(id, 'defaultSecurityRules')].{priority:priority, name:name, access:access}" \
            -o table

      # -------------------------------------------------------------
      # Confirm DNS target AND public IP SKU.
      #
      # Why SKU matters: in modern Azure, the default public IP SKU is
      # "Standard". A Standard-SKU PIP is **secure-by-default** — it
      # implicitly DENIES all inbound traffic from the internet unless
      # an NSG explicitly allows it. A Basic-SKU PIP defaults the other
      # way (allow-all). The first diag run showed no NSG at NIC or
      # subnet level, so if the PIP is Standard, that alone explains
      # the connect-timeout from Let's Encrypt. We need to see the SKU
      # to pick the right fix (add NSG rules vs. something else).
      # This step is READ-ONLY (`show` command).
      # -------------------------------------------------------------
      - name: Show VM public IP + SKU
        run: |
          set -eu
          echo "=== Public IPs in the resource group ==="
          az network public-ip list -g "$RESOURCE_GROUP" \
            --query "[].{name:name, ip:ipAddress, sku:sku.name, tier:sku.tier, assoc:ipConfiguration.id}" \
            -o table
          echo
          echo "=== Detail: pip-starky-auth-prod ==="
          az network public-ip show -g "$RESOURCE_GROUP" -n pip-starky-auth-prod \
            --query "{name:name, sku:sku, allocation:publicIpAllocationMethod, version:publicIpAddressVersion}" \
            -o json

      # -------------------------------------------------------------
      # Inside-the-VM view via Azure's run-command (no SSH). Each of
      # the sub-steps below runs a DIFFERENT run-command invocation
      # with a SMALL script — because run-command caps the returned
      # message and our previous single-big-script got truncated from
      # the front (the last ~4KB of verbose Caddy logs crowded out the
      # ss/ufw/docker-ps output we actually needed).
      #
      # All commands below are READ-ONLY:
      #   - ss / netstat : list TCP listening sockets
      #   - ufw status   : read firewall state
      #   - docker ps    : list running containers (no change)
      #   - docker inspect : read container health (no change)
      # Nothing is written, no container is restarted, no rule added.
      # -------------------------------------------------------------
      - name: VM — host TCP listen sockets
        run: |
          set -eu
          SCRIPT='
          echo "=== uname + uptime ==="
          uname -a; uptime
          echo
          echo "=== Host TCP listen sockets (who is bound to which port on the host netns) ==="
          ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || echo "neither ss nor netstat available"
          '
          az vm run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "$SCRIPT" \
            --query "value[0].message" -o tsv

      - name: VM — UFW + iptables state
        run: |
          set -eu
          # Looks at both UFW (if installed) and the raw filter chain.
          # If UFW is active and denies 80/443, that is the root cause
          # and the Azure-layer fix we were considering is irrelevant.
          SCRIPT='
          echo "=== UFW status ==="
          if command -v ufw >/dev/null 2>&1; then
            ufw status verbose 2>/dev/null || ufw status 2>/dev/null || echo "ufw command failed"
          else
            echo "ufw not installed"
          fi
          echo
          echo "=== iptables INPUT chain (policy + rules) ==="
          iptables -S INPUT 2>/dev/null | head -40 || echo "cannot read iptables"
          echo
          echo "=== iptables nat PREROUTING (shows Docker port forwards) ==="
          iptables -t nat -S PREROUTING 2>/dev/null | head -40 || echo "cannot read iptables nat"
          '
          az vm run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "$SCRIPT" \
            --query "value[0].message" -o tsv

      - name: VM — docker ps + keycloak health
        run: |
          set -eu
          SCRIPT='
          echo "=== docker ps ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo
          echo "=== keycloak-server health ==="
          docker inspect --format "{{.State.Health.Status}}" keycloak-server 2>/dev/null || echo "not running"
          echo
          echo "=== keycloak-server last 10 health probe outputs ==="
          docker inspect --format "{{range .State.Health.Log}}exit={{.ExitCode}} out={{.Output}}{{println}}{{end}}" keycloak-server 2>/dev/null | tail -10 || true
          '
          az vm run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$VM_NAME" \
            --command-id RunShellScript \
            --scripts "$SCRIPT" \
            --query "value[0].message" -o tsv
